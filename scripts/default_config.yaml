database:
  name: emby_playback.db
emby:
  server_url: ""
  external_url: ""
  api_key: your_api_key_here
service:
  external_url: ""
monitor:
  check_interval: 10
ip_location:
  use_geocache: false
notifications:
  alert_threshold: 2
  enable_alerts: true
security:
  auto_disable: true
  whitelist:
    - admin
    - user1
    - user2
  ipv6_prefix_length: 64
webhook:
  enabled: false
  url:
  timeout: 10
  retry_attempts: 3
  body:
    title: Emby用户封禁通知
    content: 用户 {username} 在 {location} 使用 {ip_address} ({ip_type}) 登录，检测到 {session_count} 个并发会话，已自动封禁。
tmdb:
  enabled: true
  api_key:
  language: zh-CN
  include_adult: false
guest_request:
  enabled: true
proxy:
  enabled: false
  url: ""
email:
  enabled: false
  smtp_server: "smtp.qq.com"
  smtp_port: 465
  sender_email: ""
  sender_password: ""
  use_ssl: true
landing:
  source: "default"
