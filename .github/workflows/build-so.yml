name: Build Multi-arch .so via Cython

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        default: ''
  push:
    branches: [ main, pre ]
    paths:
      - 'scripts/geocache_client.py'
      - '.github/workflows/build-so.yml'

jobs:
  build-so:
    name: Build .so (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build in Alpine via Docker
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            python:3.12-alpine \
            sh -c '
              apk add --no-cache gcc musl-dev python3-dev py3-setuptools
              pip install --break-system-packages cython

              cd scripts
              cythonize -3 -i geocache_client.py

              echo "=== Generated files ==="
              find . -name "*.cpython*.so" | while read f; do
                echo "$f ($(file "$f" | cut -d: -f2))"
              done
            '

      - name: Collect .so artifacts
        run: |
          mkdir -p dist
          for f in scripts/*.cpython*.so; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            # Extract the module name (everything before .cpython-...)
            mod_name="${base%%.cpython-*}"
            cp "$f" "dist/${mod_name}-${{ matrix.arch }}.cpython-312-linux-gnu.so"
          done
          echo "=== Collected artifacts ==="
          ls -la dist/

      - name: Upload .so artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geocache-client-so-${{ matrix.arch }}
          path: dist/*.so
          retention-days: 30

  release:
    name: Create Release
    needs: build-so
    runs-on: ubuntu-latest
    if: always() && needs.build-so.result == 'success'
    steps:
      - name: Download amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: geocache-client-so-amd64
          path: download-amd64

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: geocache-client-so-arm64
          path: download-arm64

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find download-amd64/ download-arm64/ -name "*.so" -exec cp {} release/ \; 2>/dev/null || true
          ls -la release/

      - name: Generate release tag
        id: tag
        run: echo "tag=so-$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: release/*.so
          generate_release_notes: true
