name: Build and Push Multi-arch Docker Image

on:
  push:
    branches: [ main, test, pre ]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  # Opt in to Node 24 runtime for JavaScript actions (GitHub Actions Node20 deprecation)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run startup self-check
        run: python scripts/main.py --self-check

  build-and-push:
    runs-on: ubuntu-latest
    needs: self-check
    concurrency:
      group: docker-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Decide docker tags
        id: tags
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            {
              echo 'TAGS<<EOF'
              echo 'pdzhou/embyq:latest'
              echo "pdzhou/embyq:${{ steps.date.outputs.DATE }}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "test" ]; then
            {
              echo 'TAGS<<EOF'
              echo 'pdzhou/embyq:test'
              echo "pdzhou/embyq:test-${{ steps.date.outputs.DATE }}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "pre" ]; then
            {
              echo 'TAGS<<EOF'
              echo 'pdzhou/embyq:pre'
              echo "pdzhou/embyq:pre-${{ steps.date.outputs.DATE }}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'TAGS<<EOF'
              echo "pdzhou/embyq:${GITHUB_REF_NAME}-${{ steps.date.outputs.DATE }}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.TAGS }}
